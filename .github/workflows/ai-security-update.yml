name: AI Powered Weekly Security Update

on:
  schedule:
    - cron: '0 12 * * 0' # 台北時間每週日晚上 20:00 自動執行
  workflow_dispatch: # 允許手動點擊按鈕測試

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run AI Security Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import google.generativeai as genai
          import requests
          import base64
          import json
          import os
          import re

          # 1. 設定 Gemini 模型
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          
          # 自動偵測可用模型，優先選取 1.5 系列
          available_models = [m.name for m in genai.list_models() if 'generateContent' in m.supported_generation_methods]
          target_model = next((m for m in available_models if '1.5-flash' in m), available_models[0])
          print(f"使用模型: {target_model}")
          model = genai.GenerativeModel(target_model)

          # 2. 定義符合使用者格式的 Prompt
          prompt = """
          你是一位專業的資訊安全長 (CISO)。請根據你的知識庫列出 2026 年 4 月 12 日至 19 日台灣最新的 5 則資安動態。
          內容須包含：數發部 (MODA) 最新規範、台灣本地資安事件、或影響電子製造服務業 (EMS) 的威脅。

          【嚴格規範】
          1. 標題與描述使用繁體中文。
          2. 對於離職人員，專業術語請一律使用 'Separated Employees'。
          3. 輸出的 JSON 格式必須與下列範例欄位完全一致：
          [
            {
              "id": "news-XXX",
              "title": "【風險等級】新聞標題",
              "desc": "簡短內容描述，字數約 50-100 字",
              "url": "正確的新聞連結",
              "tags": ["標籤1", "標籤2"],
              "level": "high/medium/low/info",
              "matchDomains": ["相關網域1", "相關網域2"],
              "updatedAt": "2026-04-19",
              "expireAt": "2026-07-19",
              "pin": false
            }
          ]
          請直接回傳 JSON 陣列，不要有任何 Markdown 標記或解釋文字。
          """
          
          try:
              response = model.generate_content(prompt)
              # 強化 JSON 提取，確保只抓取 [ ] 之間的內容
              match = re.search(r'\[.*\]', response.text, re.DOTALL)
              if not match:
                  print("錯誤：AI 未回傳有效的 JSON 格式")
                  exit(1)
              news_content = match.group(0)
              # 驗證 JSON 格式是否正確
              json.loads(news_content) 
          except Exception as e:
              print(f"AI 生成或解析失敗: {e}")
              exit(1)

          # 3. 推送更新至 GitHub
          REPO = "jackchanggithub/jackchanggithub.github.io"
          FILE = "security-news.json"
          url = f"https://api.github.com/repos/{REPO}/contents/{FILE}"
          headers = {
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Accept": "application/vnd.github.v3+json"
          }
          
          # 取得現有檔案的 SHA
          res_get = requests.get(url, headers=headers)
          sha = res_get.json().get('sha') if res_get.status_code == 200 else None

          # 推送新檔案
          content_b64 = base64.b64encode(news_content.encode('utf-8')).decode('utf-8')
          payload = {
              "message": "🤖 AI 自動更新：週報資料格式同步",
              "content": content_b64,
              "branch": "main"
          }
          if sha:
              payload["sha"] = sha
          
          res_put = requests.put(url, headers=headers, json=payload)
          if res_put.status_code in [200, 201]:
              print("✅ JSON 格式同步更新完成！")
          else:
              print(f"❌ 更新失敗: {res_put.text}")
          EOF
