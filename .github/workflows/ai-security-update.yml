name: AI Powered Weekly Security Update

on:
  schedule:
    - cron: '0 12 * * 0' # 台北時間每週日晚上 20:00
  workflow_dispatch: 

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run AI Security Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          TODAY: ${{ github.event.repository.updated_at }} # 取得時間參考
        run: |
          python - <<EOF
          import google.generativeai as genai
          import requests
          import base64
          import json
          import os
          import re
          from datetime import datetime

          # 1. 初始化
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          available_models = [m.name for m in genai.list_models() if 'generateContent' in m.supported_generation_methods]
          target_model = next((m for m in available_models if '1.5-flash' in m), available_models[0])
          model = genai.GenerativeModel(target_model)

          # 2. 設定 Prompt (嚴格格式)
          today_str = datetime.now().strftime("%Y-%m-%d")
          prompt = f"""
          你是一位專業的 CISO。請搜尋 2026 年 4 月 12 日至 19 日台灣最新 5 則資安動態。
          包含：數發部 (MODA) 最新規範、台灣資安事件、或 EMS 產業威脅。
          
          專業術語：離職人員請一律使用 'Separated Employees'。

          格式規範 (必須完全一致):
          [
            {{
              "id": "news-{datetime.now().strftime('%y%m%d')}-01",
              "title": "【風險等級】新聞標題",
              "desc": "描述對企業影響",
              "url": "網址",
              "tags": ["標籤"],
              "level": "high/medium/low/info",
              "matchDomains": ["domain.com"],
              "updatedAt": "{today_str}",
              "expireAt": "2026-07-19",
              "pin": false
            }}
          ]
          直接回傳 JSON，不要 markdown 標記。
          """
          
          response = model.generate_content(prompt)
          clean_text = re.sub(r'```json\s*|```', '', response.text).strip()
          
          # 3. 推送到 GitHub (修復大括號衝突)
          REPO = "jackchanggithub/jackchanggithub.github.io"
          FILE = "security-news.json"
          url = f"https://api.github.com/repos/{REPO}/contents/{FILE}"
          token = os.environ['GITHUB_TOKEN']
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github.v3+json"
          }
          
          get_res = requests.get(url, headers=headers)
          sha = get_res.json().get('sha') if get_res.status_code == 200 else None

          content_b64 = base64.b64encode(clean_text.encode('utf-8')).decode('utf-8')
          payload = {
              "message": f"🤖 AI Update: 格式精確同步 ({today_str})",
              "content": content_b64,
              "branch": "main"
          }
          if sha:
              payload["sha"] = sha
          
          res = requests.put(url, headers=headers, json=payload)
          if res.status_code in [200, 201]:
              print("✅ 格式同步更新成功！")
          else:
              print(f"❌ 失敗: {res.text}")
          EOF
