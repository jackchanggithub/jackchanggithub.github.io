name: AI Powered Weekly Security Update

on:
  schedule:
    - cron: '0 12 * * 0' # 台北時間每週日晚上 20:00
  workflow_dispatch: 

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run AI Security Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import google.generativeai as genai
          import requests
          import base64
          import json
          import os
          import re

          # 設定 Gemini (修正模型名稱)
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-flash-latest')

          # 讓 AI 搜尋並產生專業內容
          prompt = """
          你是一位資深的資訊安全長 (CISO)。請根據你現有的知識庫搜尋 2026 年 4 月 12 日至 19 日台灣最新的 5 則資安動態。
          內容應包含：數發部 (MODA) 法規、台灣資安事件、或對電子製造業有影響的威脅。
          
          特別規範：
          1. 標題與描述請用繁體中文。
          2. 對於離職人員，專業術語請一律使用 'Separated Employees'。
          3. 嚴格依照以下 JSON 格式輸出，不要有任何多餘文字：
          [{"id": "...", "title": "...", "desc": "...", "url": "...", "tags": [], "level": "high/medium/low/info", "matchDomains": [], "updatedAt": "2026-04-19", "expireAt": "2026-07-19", "pin": false}]
          """
          
          response = model.generate_content(prompt)
          
          # 強化後的 JSON 提取邏輯
          match = re.search(r'\[.*\]', response.text, re.DOTALL)
          if not match:
              print("無法從 AI 回傳內容中提取 JSON")
              exit(1)
          
          news_json = match.group(0)

          # GitHub API 設定
          REPO = "jackchanggithub/jackchanggithub.github.io"
          FILE = "security-news.json"
          url = f"[https://api.github.com/repos/](https://api.github.com/repos/){REPO}/contents/{FILE}"
          headers = {"Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}", "Accept": "application/vnd.github.v3+json"}
          
          # 取得檔案 SHA 值
          get_res = requests.get(url, headers=headers)
          sha = get_res.json().get('sha') if get_res.status_code == 200 else None

          # 執行更新推送
          content_b64 = base64.b64encode(news_json.encode('utf-8')).decode('utf-8')
          payload = {"message": "🤖 AI Weekly Update: 台灣資安動態", "content": content_b64, "branch": "main"}
          if sha: payload["sha"] = sha
          
          res = requests.put(url, headers=headers, json=payload)
          if res.status_code in [200, 201]:
              print("✅ AI 更新成功！")
          else:
              print(f"❌ 更新失敗 {res.status_code}: {res.text}")
          EOF
