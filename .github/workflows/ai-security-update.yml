name: AI Powered Weekly Security Update

on:
  schedule:
    - cron: '0 12 * * 0' # UTC 12:00 = 台北時間 20:00
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run AI Security Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import google.generativeai as genai
          import requests
          import base64
          import json
          import os
          import re
          from datetime import datetime

          # 1. 啟動 Gemini AI 並偵測可用模型
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          available_models = [
              m.name for m in genai.list_models()
              if "generateContent" in m.supported_generation_methods
          ]
          target_model = next((m for m in available_models if "1.5-flash" in m), available_models[0])
          model = genai.GenerativeModel(target_model)

          # 2. 日期變數
          today_str = datetime.now().strftime("%Y-%m-%d")
          id_date = datetime.now().strftime("%y%m%d")

          prompt = f"""
          你是一位專業的資訊安全長 (CISO)。請搜尋最近一週台灣最新 5 則資安動態。
          重點：最新法令、資安法、企業被入侵資訊、個資外洩事件、詐騙事件、AI資安相關事件。
          【真實性規範】嚴禁使用 example.com 或虛假連結。若不確定網址，必須導向該機構官網公告頁(如 https://www.moda.gov.tw/press/press-releases/ )。
          【專業術語】離職人員請一律使用 'Separated Employees'。標題與描述請用繁體中文。
          【格式規範】(必須精確對齊以下 JSON 欄位):
          [
            {{
              "id": "news-{id_date}-01",
              "title": "【風險等級】新聞標題",
              "desc": "描述對企業或 EMS 產業的影響，字數約 50-100 字",
              "url": "真實的官方網址",
              "tags": ["標籤1", "標籤2"],
              "level": "high/medium/low/info",
              "matchDomains": ["相關網域.gov.tw", "nics.nat.gov.tw"],
              "updatedAt": "{today_str}",
              "expireAt": "2026-07-19",
              "pin": false
            }}
          ]
          說明：重大法規或高風險威脅 pin 設為 true。請直接回傳純 JSON 陣列，不要有 Markdown 標記或文字說明。
          """

          # 3. 執行 AI 生成並進行內容清洗
          try:
              response = model.generate_content(prompt)
              clean_text = re.sub(r"```json\s*|```", "", response.text).strip()
              json.loads(clean_text)
          except Exception as e:
              print(f"AI 生成或 JSON 解析失敗: {e}")
              raise

          # 4. 推送到 GitHub
          REPO = "jackchanggithub/jackchanggithub.github.io"
          FILE = "security-news.json"
          api_url = f"https://api.github.com/repos/{REPO}/contents/{FILE}"

          token = os.environ["GITHUB_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github.v3+json"
          }

          # 先取得舊檔 SHA
          res_get = requests.get(api_url, headers=headers)
          sha = res_get.json().get("sha") if res_get.status_code == 200 else None

          content_b64 = base64.b64encode(clean_text.encode("utf-8")).decode("utf-8")
          commit_msg = f"🤖 AI Weekly Update: 真實連結與精確格式同步 ({today_str})"

          payload = {
              "message": commit_msg,
              "content": content_b64,
              "branch": "main"
          }
          if sha:
              payload["sha"] = sha

          res_put = requests.put(api_url, headers=headers, json=payload)

          if res_put.status_code in [200, 201]:
              print("✅ 更新成功！格式已精確同步。")
          else:
              print("❌ 失敗: " + res_put.text)
              raise Exception("GitHub API 更新失敗")
          EOF
