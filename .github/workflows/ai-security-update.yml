name: AI Powered Weekly Security Update

on:
  schedule:
    - cron: '0 12 * * 0' 
  workflow_dispatch: 

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run AI Security Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import google.generativeai as genai
          import requests
          import base64
          import json
          import os
          import re

          # 設定 Gemini
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          
          # 1. 偵測可用模型 (解決 404 問題)
          available_models = [m.name for m in genai.list_models() if 'generateContent' in m.supported_generation_methods]
          print(f"系統偵測到可用模型: {available_models}")
          
          # 優先嘗試 1.5 系列，失敗則由列表自動選取第一個
          target_model = 'models/gemini-1.5-pro'
          if target_model not in available_models:
              target_model = available_models[0]
          
          print(f"最終決定使用模型: {target_model}")
          model = genai.GenerativeModel(target_model)

          # 2. 產製內容
          prompt = """
          你是一位資深的資訊安全長 (CISO)。請搜尋 2026 年 4 月 12 日至 19 日台灣最新的 5 則資安動態。
          內容應包含：數發部 (MODA) 法規、台灣資安事件、或對電子製造業有影響的威脅。
          專業術語：離職人員請一律使用 'Separated Employees'。
          輸出格式：嚴格 JSON [{},...]，不要廢話。
          """
          
          try:
              response = model.generate_content(prompt)
              match = re.search(r'\[.*\]', response.text, re.DOTALL)
              news_json = match.group(0) if match else "[]"
          except Exception as e:
              print(f"AI 生成失敗: {e}")
              exit(1)

          # 3. GitHub 推送
          REPO = "jackchanggithub/jackchanggithub.github.io"
          FILE = "security-news.json"
          url = f"https://api.github.com/repos/{REPO}/contents/{FILE}"
          headers = {"Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}", "Accept": "application/vnd.github.v3+json"}
          
          get_res = requests.get(url, headers=headers)
          sha = get_res.json().get('sha') if get_res.status_code == 200 else None

          content_b64 = base64.b64encode(news_json.encode('utf-8')).decode('utf-8')
          payload = {"message": "🤖 AI Update via Gemini", "content": content_b64, "branch": "main"}
          if sha: payload["sha"] = sha
          
          res = requests.put(url, headers=headers, json=payload)
          if res.status_code in [200, 201]:
              print("✅ 更新成功！")
          else:
              print(f"❌ 更新失敗: {res.text}")
          EOF
