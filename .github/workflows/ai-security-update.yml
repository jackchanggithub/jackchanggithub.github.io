name: AI Powered Weekly Security Update

on:
  schedule:
    - cron: '0 12 * * 0' # 台北時間每週日晚上 20:00
  workflow_dispatch: 

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run AI Security Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import google.generativeai as genai
          import requests
          import base64
          import json
          import os
          import re
          from datetime import datetime

          # 1. 啟動 Gemini AI
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          available_models = [m.name for m in genai.list_models() if 'generateContent' in m.supported_generation_methods]
          target_model = next((m for m in available_models if '1.5-flash' in m), available_models[0])
          model = genai.GenerativeModel(target_model)

          # 2. 定義嚴謹的資安長指令 (CISO Prompt)
          today_str = datetime.now().strftime("%Y-%m-%d")
          prompt = f"""
          你是一位資深的 CISO。請列出最近一週台灣最重要的 5 則資安動態。
          包含：最新規範、資安法、企業被攻擊事件、詐騙事件、個資外洩事件。
          
          【真實性規範】
          1. 嚴禁使用 example.com 或任何虛假連結。
          2. 網址必須指向該新聞的原始來源或官方公告頁面 (如: https://www.moda.gov.tw/press/press-releases/ )。
          3. 若不確定具體新聞網址，請優先使用 iThome、資安署或數發部的官網首頁。

          【專業術語】
          1. 離職人員請一律使用 'Separated Employees'。
          2. 標題與描述使用繁體中文。

          【格式規範】(必須精確對齊以下 JSON 欄位):
          [
            {{
              "id": "news-{datetime.now().strftime('%y%m%d')}-01",
              "title": "【風險等級】新聞標題",
              "desc": "描述對企業或 EMS 產業的影響",
              "url": "真實的官方網址",
              "tags": ["標籤"],
              "level": "high/medium/low/info",
              "matchDomains": ["相關網域.gov.tw", "nics.nat.gov.tw"],
              "updatedAt": "{today_str}",
              "expireAt": "2026-07-19",
              "pin": false
            }}
          ]
          直接回傳 JSON，不准有 markdown 標記 (```json) 或文字說明。
          """
          
          # 3. 產製與解析資料
          response = model.generate_content(prompt)
          clean_text = re.sub(r'```json\s*|```', '', response.text).strip()
          
          # 4. 推送到 GitHub
          REPO = "jackchanggithub/jackchanggithub.github.io"
          FILE = "security-news.json"
          url = f"[https://api.github.com/repos/](https://api.github.com/repos/){{REPO}}/contents/{{FILE}}"
          headers = {
              "Authorization": f"Bearer {{os.environ['GITHUB_TOKEN']}}",
              "Accept": "application/vnd.github.v3+json"
          }
          
          # 取得檔案 SHA (若檔案不存在則為 None)
          res_get = requests.get(url, headers=headers)
          sha = res_get.json().get('sha') if res_get.status_code == 200 else None

          # 推送更新
          content_b64 = base64.b64encode(clean_text.encode('utf-8')).decode('utf-8')
          payload = {
              "message": f"🤖 AI Update: 真實連結與格式同步 ({today_str})",
              "content": content_b64,
              "branch": "main"
          }
          if sha: payload["sha"] = sha
          
          res_put = requests.put(url, headers=headers, json=payload)
          if res_put.status_code in [200, 201]:
              print("✅ 更新成功！")
          else:
              print(f"❌ 失敗: {{res_put.text}}")
          EOF
